<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head> 
	<f:facet name="first">
	    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
	    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
	    <meta name="apple-mobile-web-app-capable" content="yes" />
	</f:facet>
    <title>Login - ERP</title>
    
    <h:outputStylesheet library="fasda" name="login.css" />
    <h:outputStylesheet library="fasda" name="estilo.css" />
    
    <p:growl id="msgs" showDetail="true" showSummary="false" sticky="false" life="5000" />
    
    <!--
    <h:outputStylesheet name="css/layout-deep-purple.css" library="barcelona-layout" />
    <h:outputStylesheet name="css/ripple.css" library="barcelona-layout" /> 
    
    <h:outputScript name="js/ripple.js" library="barcelona-layout" />
    <h:outputScript name="js/layout.js" library="barcelona-layout" />
    -->   
</h:head>

<h:body styleClass="login-body">
    <div class="login-container ui-fluid">
        
        <div class="login-header">
            <h1>LOGIN</h1>
            <h2>Acesso ao Sistema</h2>
            <p:graphicImage name="logo-fasda.svg" library="fasda" styleClass="logo-login" />
        </div>
        
        <h:form id="formLogin" style="background: transparent !important;">
             
            <p:panelGrid columns="1" styleClass="ui-noborder painel-transparente">
                <p:outputLabel value="Usuário" for="usuario" />
                <p:inputText id="usuario" value="#{loginBean.login}" required="true"/>            
                
                <p:outputLabel value="Senha" for="senha" />
                <p:password id="senha" value="#{loginBean.senha}" required="true"/>            
                
                <h:panelGroup />
                <p:commandButton value="Entrar" action="#{loginBean.login}" update="@form :msgs" icon="pi pi-user" style="width: 100%;" />
                
                <h:panelGroup rendered="#{loginBean.exibirBotaoCadastro}" layout="block" style="text-align: center; margin-top: 15px;">
			        <p:link value="Não tem uma conta? Cadastre-se aqui" outcome="Perfil.xhtml" 
			                style="color: #0051C0; font-size: 13px; text-decoration: underline;" />
			    </h:panelGroup>                
            </p:panelGrid>                  
        </h:form>
    </div>
</h:body>

</html>
