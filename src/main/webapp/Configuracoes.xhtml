<ui:composition 
	xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    template="/WEB-INF/template/Layout.xhtml"> 
    
    <ui:param name="managedBean" value="#{configuracaoBean}" />
    
    <ui:define name="tituloHead">Configurações do Sistema</ui:define>

    <ui:define name="titulo">
    	<i class="fa fa-cog"></i>
    	<span>Configurações</span>
    </ui:define>

    <ui:define name="conteudo">
        <h:form id="formConfig">
            <p:growl id="msgs" showDetail="true" life="4000" />

            <div class="card ui-fluid">
            	<div class="flex align-items-center justify-content-between" style="margin-bottom: 10px;">
	                <h2><i class="pi pi-cog" style="margin-right: 10px;"></i>Painel de Configurações</h2>
	                
	                <div style="margin-top: 10px; text-align: right;">
	                    <p:commandButton value="Salvar Configurações" 
	                                     action="#{configuracaoBean.salvar}"
	                                     update=":formConfig:msgs"
	                                     icon="pi pi-save"
	                                     styleClass="btn-salvar-fix" />
	                </div>
                </div>
                
                <p:tabView style="margin-top: 20px;">
                    
                    <p:tab title="Uploads &amp; Arquivos">
                        <p:panelGrid columns="1" layout="grid" styleClass="ui-noborder">
                            
                            <p:outputLabel value="Diretório de Armazenamento das Imagens:" for="txtCaminho" style="font-weight: bold;" />
                            
                            <h:panelGroup layout="block" style="width: 100%;">
	                            <div class="ui-inputgroup">
	                                <span class="ui-inputgroup-addon"><i class="pi pi-folder-open"></i></span>
	                                <p:inputText id="txtCaminho" value="#{configuracaoBean.caminhoUploadImagens}" 
	                                             required="true" requiredMessage="O caminho de upload é obrigatório."
	                                             placeholder="Ex: /var/www/arquivos/imagens ou C:/uploads/imagens" />
	                            </div>
	                           	<small class="text-muted" style="display: inline-block; margin-top: 5px; color: #6c757d;">
	                           		* Certifique-se de que o servidor possui permissão de leitura e escrita nesta pasta.
	                           	</small>
                           	</h:panelGroup>
                        </p:panelGrid>
                    </p:tab>
                    
                    <p:tab title="Financeiro &amp; Vendas">
				        <p:panelGrid columns="2" layout="grid" styleClass="ui-noborder" columnClasses="ui-grid-col-4, ui-grid-col-4">
				            
				            <p:outputLabel value="Margem de Lucro Mínima (%):" for="txtMargem" />
				            <p:inputNumber id="txtMargem" value="#{configuracaoBean.margemLucroMinima}" symbol="%" symbolPosition="s" decimalPlaces="2" />
				            
				            <p:outputLabel value="Permitir Venda com Estoque Negativo?" for="chkEstoque" />
				            <p:selectBooleanButton id="chkEstoque" value="#{configuracaoBean.permitirEstoqueNegativo}" 
					                            	onLabel="Sim" offLabel="Não" 
					                               	onIcon="pi pi-check" offIcon="pi pi-times" 
					                               	styleClass="btn-liga-desliga" />
				            
				        </p:panelGrid>
				    </p:tab>
				
				    <p:tab title="Configurações de E-mail">
				        <p:panelGrid columns="2" layout="grid" styleClass="ui-noborder" columnClasses="ui-grid-col-3, ui-grid-col-9">
				          
				            <p:outputLabel value="Servidor SMTP:" for="smtpHost" />
				            <p:inputText id="smtpHost" value="#{configuracaoBean.smtpHost}" placeholder="ex: smtp.gmail.com" />
				            
				            <p:outputLabel value="Porta:" for="smtpPort" />
				            <p:inputText id="smtpPort" value="#{configuracaoBean.smtpPort}" placeholder="Digite o valor" />
				            
				            <p:outputLabel value="E-mail Remetente:" for="smtpUser" />
				            <p:inputText id="smtpUser" value="#{configuracaoBean.smtpUser}" placeholder="ex: sistema@empresa.com" />
				          
				        </p:panelGrid>
				    </p:tab>

                    <p:tab title="Segurança &amp; Sistema">
					    <p:tabView style="margin-top: 10px;">
						    <p:tab title="Login">
						    	<br />
							    <h3>Controle de Cadastro na Tela de Login</h3>
							    <p:separator />
							    <p:panelGrid columns="2" layout="grid" styleClass="ui-noborder" columnClasses="ui-grid-col-4, ui-grid-col-8">
							        
							        <p:outputLabel value="Permitir novos cadastros na tela de login?" for="chkCadastro" />
							        <p:selectBooleanButton id="chkCadastro" value="#{configuracaoBean.permitirCadastroUsuarios}" 
							                               onLabel="Sim" offLabel="Não" 
							                               onIcon="pi pi-check" offIcon="pi pi-times" 
							                               styleClass="btn-liga-desliga" />
							    </p:panelGrid>
						    </p:tab>							    
						    <p:tab title="Permissões">
							    <br />
							    <h3 class="title" style="margin-bottom: 15px;">Matriz de Permissões por Perfil</h3>
							    <p:separator />
							    <div class="ui-g">
							        <div class="ui-g-12">
							        	<p:tree value="#{configuracaoBean.raizPermissoes}" 
							        			var="no" 
							        			selectionMode="checkbox" 
							        			selection="#{configuracaoBean.nosSelecionados}">
					                        
					                        <p:treeNode icon="pi pi-folder">
					                            <h:outputText value="#{no}" />
					                        </p:treeNode>
					                        
					                        <p:treeNode type="tela" icon="pi pi-desktop">					                        	
					                            <h:outputText value="#{no}" />
					                        </p:treeNode>
					                        
					                        <p:treeNode type="acao" icon="pi pi-key">
					                            <h:outputText value="#{no}" />
					                        </p:treeNode>
					                    </p:tree>    
							        </div>
							    </div>
						    </p:tab>						    
				
					    </p:tabView>
					</p:tab>
                    
                </p:tabView>

            </div>
        </h:form>
    </ui:define>

</ui:composition>
