<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    template="/WEB-INF/template/templateCRUD.xhtml">
    
    <ui:param name="managedBean" value="#{usuarioBean}" />
    
    <ui:define name="tituloHead">Usuários</ui:define>
   
    <ui:define name="titulo">    	
    	<i class="fa fa-users"></i>
    	<span>Usuários</span>
    </ui:define>
    
    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar usuário..." 
                     size="30" value="#{usuarioBean.termoPesquisa}" />
    </ui:define>
   
    <ui:define name="colunas">      
        <p:column headerText="Imagem" style="width: 70px; text-align: center;">
		    <p:graphicImage value="/img-pessoas/#{item.fotoCaminho}" 
		                    cache="false" 
		                    style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; object-position: 50% 10%;"
		                    rendered="#{item.fotoCaminho != null}" />
		    
		    <h:panelGroup rendered="#{item.fotoCaminho == null}">
		        <i class="pi pi-user" style="font-size: 1.5rem; color: #ccc;"></i>
		    </h:panelGroup>
		</p:column>
		
		<p:column headerText="Usuário" style="width: 200px; text-align: center;">
			#{item.nomeUsuario}
		</p:column>
        
        <p:column headerText="Nome" style="text-align: center;">
        	#{item.nome}
        </p:column>
    </ui:define>
   
    <ui:define name="campos_formulario">
       	<h:panelGroup id="gridCampos" layout="block" style="width: 100%;">	
	    	<h:panelGroup id="fotoPanel" layout="block" style="text-align: left; margin-bottom: 20px;">
	    	    
			    <p:graphicImage value="/img-pessoas/#{usuarioBean.entidade.fotoCaminho}" 
	                cache="false"
	                style="width: 120px; height: 120px; border-radius: 50%;"
	                rendered="#{usuarioBean.entidade.fotoCaminho != null}" />
			
			    <p:graphicImage library="barcelona-layout" name="images/avatar.png" 
			                    style="width: 120px; height: 120px; border-radius: 50%;"
			                    rendered="#{usuarioBean.entidade.fotoCaminho == null}" />
			
			</h:panelGroup>
			
			<p:outputLabel for="foto" />
	        <div style="max-width: 135px;">
		        <p:growl id="msgs" showDetail="true" life="4000" />
		        
				<p:fileUpload id="foto" 
				              listener="#{usuarioBean.handleFileUpload}"
				              mode="advanced" 
				              update="msgs" 
				              auto="true" 
				              sizeLimit="2000000" 
				              allowTypes="/(\.|\/)(gif|jpe?g|png)$/"
				              label="Escolher" />
			</div>			
			<p:tabView id="tabUsuario">
				<p:tab title="Dados Principais">
					<div class="ui-fluid formgrid grid">
						<p:message id="msgUsuario" for="nomeUsuario" display="text" />
						
						<div class="field col-12 md:col-12">
							<p:outputLabel value="Nome Completo" for="nome" />
							<p:inputText id="nome" value="#{usuarioBean.entidade.nome}"
										 size="30" 
							             required="true" maxlength="100"
							             placeholder="Ex: Flávio Almeida" /> 			             
					   	</div>
					   	<div class="field col-12 md:col-12">    
						    <p:outputLabel value="Usuário" for="nomeUsuario" />
						    <p:inputText id="nomeUsuario" value="#{usuarioBean.entidade.nomeUsuario}" 
						    			 size="30" required="true" >
					    		<p:ajax event="blur" listener="#{usuarioBean.verificarDisponibilidade}" update="msgUsuario" />
					    		
					    	</p:inputText>	    
						</div>
						<div class="field col-12 md:col-12">    
						    <p:outputLabel value="Senha" for="senha" />
						    <p:password id="senha" value="#{usuarioBean.entidade.senha}"
						    			required="#{usuarioBean.entidade.id == null}" 
						    			feedback="true"
						    			size="30"
						    			placeholder="#{usuarioBean.entidade.id == null ? 'Digite a senha' : 'Deixe em branco para manter a atual'}"
					            		weakLabel="Fraca" goodLabel="Boa" strongLabel="Forte"/>
           				</div>
           			</div>
           		</p:tab>	        
            </p:tabView>
		</h:panelGroup>
	</ui:define>

</ui:composition>
