<ui:composition 
	xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    template="/WEB-INF/template/templateCRUD.xhtml">
    
    <ui:param name="managedBean" value="#{pessoaBean}" />
    
    <ui:define name="tituloHead">Pessoas</ui:define>
    
    <ui:define name="titulo">    	
    	<i class="fa-solid fa-person"></i>
    	<span>Pessoas</span>
    </ui:define>
    
    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar pessoa..." 
                     size="30" value="#{pessoaBean.termoPesquisa}" />
    </ui:define>
    
    <ui:define name="colunas">
        <p:column headerText="Nome Pessoa">#{item.nome}</p:column>
        <p:column headerText="E-mail">#{item.email}</p:column>
        
        <p:column headerText="Cliente" style="width: 100px;">#{item.cliente}</p:column>
        <p:column headerText="Fornecedor" style="width: 100px;">#{item.fornecedor}</p:column>
        <p:column headerText="Funcionário" style="width: 100px;">#{item.funcionario}</p:column>
    </ui:define>
    
    <ui:define name="campos_formulario">		
		  
		    <p:panelGrid columns="2" id="gridCampos">	        
		        <p:outputLabel value="Tipo de Pessoa" for="tipo" />
		        <p:selectOneButton id="tipo" value="#{pessoaBean.tipoPessoa}" unselectable="false">
		            <f:selectItem itemLabel="Física" itemValue="FISICA" />
		            <f:selectItem itemLabel="Jurídica" itemValue="JURIDICA" />
		            <p:ajax listener="#{pessoaBean.prepararNovo}" 
		            	process="@this" 
		            	update="gridCampos" />
		        </p:selectOneButton>
				
		        <p:outputLabel value="Nome" for="nome" />
		        <p:inputText id="nome" value="#{managedBean.entidade.nome}" style="width: 100%" />
				
		        <p:outputLabel value="E-mail" for="email" />
		        <p:inputText id="email" value="#{pessoaBean.entidade.email}" style="width: 100%" />
		        
		        <p:outputLabel value="CNPJ" for="cnpj" rendered="#{pessoaBean.tipoPessoa eq 'JURIDICA'}" />
	        		        	
		        <p:inputMask id="cnpj" value="#{pessoaBean.entidade.cnpj}" mask="99.999.999/9999-99"
		                     rendered="#{pessoaBean.tipoPessoa eq 'JURIDICA'}" style="width: 100%" />
						
		        <p:outputLabel value="CPF" for="cpf" rendered="#{pessoaBean.tipoPessoa eq 'FISICA'}" />	
		     	
		        <p:inputMask id="cpf" value="#{pessoaBean.entidade.cpf}" mask="999.999.999-99" 
	                     	 rendered="#{pessoaBean.tipoPessoa eq 'FISICA'}" style="width: 100%" />
		        
			    <p:outputLabel value="Papéis"/>
			    
			    <h:panelGroup style="display: flex; gap: 15px;">
			            
		            <p:selectBooleanCheckbox value="#{pessoaBean.entidade.cliente}" />
		            <h:outputText value=" Cliente" />
		        
		            <p:selectBooleanCheckbox value="#{pessoaBean.entidade.fornecedor}" />
		            <h:outputText value=" Fornecedor" />
		        
		            <p:selectBooleanCheckbox value="#{pessoaBean.entidade.funcionario}" />
		            <h:outputText value=" Funcionário" />
			        
			    </h:panelGroup>
				
		    </p:panelGrid>
			
		    
	  	
    </ui:define>  

</ui:composition>
