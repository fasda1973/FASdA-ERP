<ui:composition 
	xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    template="/WEB-INF/template/templateCRUD.xhtml">
    
    <ui:param name="managedBean" value="#{pessoaBean}" />
    
    <ui:define name="tituloHead">
    	Pessoas
    </ui:define>
    
    <ui:define name="titulo">    	
    	<i class="fa-solid fa-person"></i>
    	<span>Pessoas</span>
    </ui:define>
    
    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar pessoa..." 
                     size="30" value="#{pessoaBean.termoPesquisa}" />
    </ui:define>
    
    <ui:define name="colunas">
    	<p:column headerText="Imagem" style="width: 70px; text-align: center;">
		    <p:graphicImage value="/img-pessoas/#{item.fotoCaminho}" 
		                    cache="false" 
		                    style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; object-position: 50% 10%;"
		                    rendered="#{item.fotoCaminho != null}" />
		    
		    <h:panelGroup rendered="#{item.fotoCaminho == null}">
		        <i class="pi pi-user" style="font-size: 1.5rem; color: #ccc;"></i>
		    </h:panelGroup>
		</p:column>
    
        <p:column headerText="Nome Pessoa" style="text-align: center;">
        	#{item.nome}
       	</p:column>
       	
        <p:column headerText="E-mail" style="text-align: center;">
        	#{item.email}
        </p:column>
        
        <p:column headerText="Cliente" style="text-align: center; width: 100px;">
        	<span class="sinalizador-booleano" 
        		  style="background-color: #{item.cliente ? '#2e7d32' : '#d32f2f'};">
        	#{item.cliente ? 'Sim' : 'Não'}
        	</span>
        </p:column>
        
        <p:column headerText="Fornecedor" style="text-align: center; width: 100px;">
        	<span class="sinalizador-booleano"
        		  style="background-color: #{item.fornecedor ? '#2e7d32' : '#d32f2f'};">
        	#{item.fornecedor ? 'Sim' : 'Não'}
        	</span>
        </p:column>
        
        <p:column headerText="Funcionário" style="text-align: center; width: 100px;">
        	<span class="sinalizador-booleano"
        		  style="background-color: #{item.funcionario ? '#2e7d32' : '#d32f2f'};">
        	#{item.funcionario ? 'Sim' : 'Não'}
        	</span>
        </p:column>
    </ui:define>
    
    <ui:define name="campos_formulario">
        <!-- Mantemos um container pai com o ID antigo para o AJAX do botão de Tipo continuar funcionando -->
        <h:panelGroup id="gridCampos" layout="block" style="width: 100%;">           
            <!-- Bloco Superior: Tipo de Pessoa, Status e Papéis (Sempre visíveis no topo) -->
            <div class="ui-fluid formgrid grid align-items-start" style="margin-bottom: 20px; background: #fdfdfd; padding: 20px; border-radius: 6px; border: 1px solid #e0e0e0; row-gap: 15px;">
                <div class="field col-8 flex flex-wrap gap-5" style="margin-bottom: 2px;">
                    <div>
	                    <p:outputLabel value="Tipo de Pessoa" for="tipo" style="font-weight: bold; display: block; margin-bottom: 8px;" />
	                    <div style="max-width: 300px;">
		                    <p:selectOneButton id="tipo" value="#{pessoaBean.tipoPessoa}" unselectable="false">		                        
		                        <f:selectItem itemLabel="Jurídica" itemValue="JURIDICA" />
		                        <f:selectItem itemLabel="Física" itemValue="FISICA" />
		                        <p:ajax listener="#{pessoaBean.prepararNovo}" 
		                        		process="@this" 
		                        		update="gridCampos" />
		                    </p:selectOneButton>
	                    </div>
                    </div>
                    <div>           
	                    <p:outputLabel value="Papéis operacionais" style="font-weight: bold; display: block; margin-bottom: 12px;" />
	                    <div class="flex flex-wrap gap-4">                       
	                        <div class="flex align-items-center">                      
				                <p:selectBooleanCheckbox value="#{pessoaBean.entidade.cliente}" id="chkCliente" />
				                <p:outputLabel for="chkCliente" value="Cliente" style="margin-left: 8px; cursor: pointer;" />
			                </div>           
				            <div class="flex align-items-center">		            
				                <p:selectBooleanCheckbox value="#{pessoaBean.entidade.fornecedor}" id="chkFornecedor" />
				                <p:outputLabel for="chkFornecedor" value="Fornecedor" style="margin-left: 8px; cursor: pointer;" />
			                </div>  	            
				            <div class="flex align-items-center">		            
				                <p:selectBooleanCheckbox value="#{pessoaBean.entidade.funcionario}" id="chkFuncionario">
				                	<p:ajax event="change" update="painelMatricula" process="@this" />
			                	</p:selectBooleanCheckbox>
				                <p:outputLabel for="chkFuncionario" value="Funcionário" style="margin-left: 8px; cursor: pointer;" />
			                </div>		                	            
	                    </div>                   
                    </div>
                    
                    <div>
	                    <p:outputLabel value="Status do Cadastro" style="font-weight: bold; display: block; margin-bottom: 12px;" />
				        
					        <div class="flex align-items-center">
					            <p:selectBooleanCheckbox value="#{pessoaBean.entidade.ativo}" id="ativo" />
					            <p:outputLabel for="ativo" value="Cadastro Ativo" style="margin-left: 8px; cursor: pointer;" />
					        </div>
				       
             		</div>
                    
                    <h:panelGroup id="painelMatricula" layout="block" styleClass="flex align-items-center">
                    	<h:panelGroup rendered="#{pessoaBean.entidade.funcionario}">
	                    	<div class="field">
						        <p:outputLabel value="Matrícula" for="matricula" style="display: block; font-weight: bold;" />
						        <p:inputText id="matricula" 
						        			 value="#{pessoaBean.entidade.dadosFuncionario.matricula}" 
						        			 required="true"
						        			 requiredMessage="A matrícula é obrigatória para funcionários." />
		        			</div>
	        			</h:panelGroup>
			        </h:panelGroup>
                    
                </div>
                <div class="field col-4" style="margin-bottom: 2px;">
                	<p:outputLabel value="Imagem da Pessoa" style="font-weight: bold; display: block; margin-bottom: 8px;" />
                	<p:graphicImage value="/img-pessoas/#{pessoaBean.entidade.fotoCaminho}" 
		                cache="false"
		                style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; object-position: 50% 10%;"
		                rendered="#{pessoaBean.entidade.fotoCaminho != null}" />
	                <h:panelGroup rendered="#{pessoaBean.entidade.fotoCaminho == null}">
				        <i class="pi pi-user" style="font-size: 1.5rem; color: #ccc;"></i>
				    </h:panelGroup>
				    
				    <p:outputLabel for="foto"/>
				    <div style="max-width: 135px;">
					<p:fileUpload id="foto" 
					              listener="#{pessoaBean.handleFileUpload}"
					              mode="advanced" 
					              update="messages" 
					              auto="true" 
					              sizeLimit="2000000" 
					              allowTypes="/(\.|\/)(gif|jpe?g|png)$/"
					              label="Escolher" />
	                </div>
                </div>              
            </div>

            <!-- O grande divisor: Abas para organizar os dados espalhados -->
            <p:tabView id="tabPessoa">
                
                <!-- ABA 1: IDENTIFICAÇÃO E CONTATOS -->
                <p:tab title="Dados Principais">
                    <div class="ui-fluid formgrid grid">
                        <!-- Nome ocupa 8 colunas se houver espaço, ou a linha toda no mobile -->
                        <div class="field col-12 md:col-8">
                            <p:outputLabel value="Nome / Razão Social" for="nome" />
                            <p:inputText id="nome" value="#{managedBean.entidade.nome}" />
                        </div>
                        
                        <!-- Documento Dinâmico (CPF/CNPJ) ocupa as 4 colunas restantes na mesma linha -->
                        <div class="field col-12 md:col-4">
                            <h:panelGroup rendered="#{pessoaBean.tipoPessoa eq 'JURIDICA'}">
                                <p:outputLabel value="CNPJ" for="cnpj" />
                                <p:inputMask id="cnpj" 
                                			 value="#{pessoaBean.entidade.cnpj}" 
                                			 mask="99.999.999/9999-99"
                                             required="#{pessoaBean.entidade.id == null}" 
                                             readonly="#{pessoaBean.entidade.id != null}" />
                            </h:panelGroup>
                            <h:panelGroup rendered="#{pessoaBean.tipoPessoa eq 'FISICA'}">
                                <p:outputLabel value="CPF" for="cpf" />
                                <p:inputMask id="cpf" 
                                			 value="#{pessoaBean.entidade.cpf}" 
                                			 mask="999.999.999-99" 
                                             required="#{pessoaBean.entidade.id == null}" 
                                             readonly="#{pessoaBean.entidade.id != null}" />
                            </h:panelGroup>
                        </div>

                        <!-- Segunda Linha: E-mail, Telefone e Celular lado a lado -->
                        <div class="field col-12 md:col-6">
                            <p:outputLabel value="E-mail" for="email" />
                            <p:inputText id="email" value="#{pessoaBean.entidade.email}" />
                        </div>
                        <div class="field col-12 md:col-3">
                            <p:outputLabel value="Telefone Fixio" for="telefone" />
                            <p:inputText id="telefone" value="#{pessoaBean.entidade.telefone}" />
                        </div>
                        <div class="field col-12 md:col-3">
                            <p:outputLabel value="Celular" for="celular" />
                            <p:inputText id="celular" value="#{pessoaBean.entidade.celular}" />
                        </div>
                    </div>
                </p:tab>

                <!-- ABA 2: LOCALIZAÇÃO -->
                <p:tab title="Endereço">
                    <div class="ui-fluid formgrid grid">
                        <!-- Linha 1 do Endereço: CEP e Logradouro -->
                        <div class="field col-12 md:col-3">
                            <p:outputLabel value="CEP" for="cep" />
                            <p:inputText id="cep" value="#{pessoaBean.entidade.cep}" />
                        </div>
                        <div class="field col-12 md:col-9">
                            <p:outputLabel value="Logradouro (Rua, Av.)" for="logradouro" />
                            <p:inputText id="logradouro" value="#{pessoaBean.entidade.logradouro}" />
                        </div>

                        <!-- Linha 2 do Endereço: Número, Complemento e Bairro -->
                        <div class="field col-12 md:col-2">
                            <p:outputLabel value="Número" for="numero" />
                            <p:inputText id="numero" value="#{pessoaBean.entidade.numero}" />
                        </div>
                        <div class="field col-12 md:col-5">
                            <p:outputLabel value="Complemento" for="complemento" />
                            <p:inputText id="complemento" value="#{pessoaBean.entidade.complemento}" />
                        </div>
                        <div class="field col-12 md:col-5">
                            <p:outputLabel value="Bairro" for="bairro" />
                            <p:inputText id="bairro" value="#{pessoaBean.entidade.bairro}" />
                        </div>

                        <!-- Linha 3 do Endereço: Cidade e Estado -->
                        <div class="field col-12 md:col-9">
                            <p:outputLabel value="Cidade" for="cidade" />
                            <p:inputText id="cidade" value="#{pessoaBean.entidade.cidade}" />
                        </div>
                        <div class="field col-12 md:col-3">
                            <p:outputLabel value="Estado (UF)" for="estado" />
                            <p:inputText id="estado" value="#{pessoaBean.entidade.estado}" />
                        </div>
                    </div>
                </p:tab>
                
            </p:tabView>
        </h:panelGroup>
    </ui:define>

</ui:composition>
