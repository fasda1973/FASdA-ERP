<ui:composition template="/WEB-INF/template/templateCRUD.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <ui:param name="managedBean" value="#{clienteBean}" />
    
    <ui:define name="tituloHead">Clientes</ui:define>

    <ui:define name="titulo">
    	<i class="fa-solid fa-handshake"></i>
    	<span>Clientes</span>
    </ui:define>
    
    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar pessoa..." 
                     size="30" value="#{pessoaBean.termoPesquisa}" />
    </ui:define>

    <ui:define name="colunas"> 
    	<p:column headerText="Imagem" style="width: 70px; text-align: center;">
		    <p:graphicImage value="/fotos/#{item.fotoCaminho}" 
		                    cache="false" 
		                    style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; object-position: 50% 10%;"
		                    rendered="#{item.fotoCaminho != null}" />
		    
		    <h:panelGroup rendered="#{item.fotoCaminho == null}">
		        <i class="pi pi-user" style="font-size: 1.5rem; color: #ccc;"></i>
		    </h:panelGroup>
		</p:column>
         
	    <p:column headerText="Nome">
	        <h:outputText value="#{item.nome}" />
	    </p:column>
	    
	    <p:column headerText="CPF" width="150">
	        <h:outputText value="#{item.cpf}" />
	    </p:column> 
	    
	    <p:column headerText="Limite de Crédito" width="150">
	    	<h:outputText value="#{item.dadosCliente.limiteCredito}" />
	    </p:column>
	    
	    <p:column headerText="Saldo Disponível" width="150">
	    	<h:outputText value="#{item.dadosCliente.saldoCreditoUtilizado}" />
	    </p:column>
	    
	    <p:column headerText="Última Compra" width="150">
	    	<h:outputText value="#{item.dadosCliente.dataUltimaCompra}" />
	    </p:column> 
	    
	    <p:column headerText="Status do Saldo" style="text-align: center; width: 100px;">
	    	<span class="sinalizador-booleano"
	    		  style="background-color: #{item.dadosCliente.bloqueadoPorAtraso ? '#d32f2f' : '#2e7d32'};">
        	#{item.dadosCliente.bloqueadoPorAtraso ? 'Bloqueado' : 'Livre'}
   		    </span>
	    </p:column>
	    
	    <p:column headerText="Observações Financeiras" width="200">
	    	<!-- O id é necessário para o tooltip mapear o componente -->
		    <h:outputText id="txtFinanceiro" 
		                  value="#{item.dadosCliente.observacaoFinanceira}" 
		                  styleClass="texto-limitado-linhas" />
		    
		    <!-- Exibe o texto completo em um balão flutuante ao passar o mouse -->
		    <p:tooltip for="txtFinanceiro" 
		               value="#{item.dadosCliente.observacaoFinanceira}" 
		               position="top" 
		               style="max-width: 300px;" />
	    </p:column>     
    </ui:define>

    <ui:define name="campos_formulario">       	    
	    <h:panelGroup id="gridCampos" layout="block" style="width: 100%;">
		    <p:tabView id="tabCliente">
			    <p:tab title="Dados Cliente">
				    <div class="ui-fluid formgrid grid">
					    <div class="field col-12 md:col-8">
					        <p:outputLabel value="Nome" for="nome" />
					        <p:inputText id="nome" value="#{clienteBean.entidade.nome}" />
					    </div>
					    <div class="field col-12 md:col-4">   
					        <p:outputLabel value="CPF" for="cpf" />
					        <p:inputMask id="cpf" 
				        				 value="#{clienteBean.entidade.cpf}" 
					                     mask="999.999.999-99" 
					                     required="#{clienteBean.entidade.id == null}" 
					                     readonly="#{clienteBean.entidade.id != null}" />
	                    </div>
					    <div class="field col-12 md:col-3">    
					        <p:outputLabel value="Limite de Crédito" for="limite" />
					        <p:inputNumber id="limite" 
					        			   value="#{clienteBean.entidade.dadosCliente.limiteCredito}" />
				        </div>
				        <div class="field col-12 md:col-3">    
					        <p:outputLabel value="Saldo Disponível" for="saldoCreditoUtilizado" />
					        <p:inputNumber id="saldoCreditoUtilizado" 
					        			   value="#{clienteBean.entidade.dadosCliente.saldoCreditoUtilizado}"
					        			   readonly="true" />
				        </div>
				        
				        <div class="field col-12 md:col-3">
				        	<p:outputLabel value="Status" style="display: block; margin-bottom: 12px;" />    
					        <p:selectBooleanCheckbox id="chkbloqueadoPorAtraso"  
					        						 value="#{clienteBean.entidade.dadosCliente.bloqueadoPorAtraso}" />
			                <p:outputLabel for="chkbloqueadoPorAtraso" 
			                			   value="Bloqueado" 
			                			   style="margin-left: 8px; cursor: pointer;" />
				        </div>
			        </div>
		        </p:tab>
		        <p:tab title="Observações Financeiras">
				    <div class="ui-fluid formgrid grid">
				        <div class="field col-12">
				            <p:outputLabel value="Informações e Notas Financeiras" for="obsFinanceiras" style="font-weight: bold;" />                
				            
				            <p:inputTextarea id="obsFinanceiras" 
				                             value="#{clienteBean.entidade.dadosCliente.observacaoFinanceira}" 
				                             rows="6" 
				                             cols="50" 
				                             maxlength="2000" 
				                             counter="contadorFinanceiro" 
				                             counterTemplate="{0} caracteres restantes." 
				                             autoResize="false"
				                             placeholder="Digite aqui restrições de crédito, limite de compras, histórico de cobrança ou qualquer informação financeira relevante..." />                
				            
				            <!-- Esta label serve EXCLUSIVAMENTE para o PrimeFaces injetar o contador -->
				            <h:outputText id="contadorFinanceiro" 
				                          styleClass="block text-right text-xs text-gray-500" 
				                          style="margin-top: 4px; display: block; text-align: right; font-size: 0.8em; color: #666;" />
				        </div>
				    </div>
				</p:tab>
	        </p:tabView>
	    </h:panelGroup>      
    </ui:define>
</ui:composition>
