<ui:composition template="/WEB-INF/template/templateCRUD.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <!-- Passamos o ClienteBean para o template -->
    <ui:param name="managedBean" value="#{clienteBean}" />

    <ui:define name="titulo">Cadastro de Clientes</ui:define>

    <ui:define name="tabela_dados">
        <p:dataTable value="#{clienteBean.listaItens}" var="item" ...>
            <p:column headerText="Nome">
                <h:outputText value="#{item.nome}" />
            </p:column>
            <!-- Outras colunas... -->
        </p:dataTable>
    </ui:define>

    <ui:define name="campos_formulario">
        <h:form id="formCadastro">
             <!-- Aqui você pode até esconder os checkboxes de "Papel" 
                  já que nesta tela estamos tratando apenas de Clientes -->
             <p:panelGrid columns="2">
                 <p:outputLabel value="Nome" for="nome" />
                 <p:inputText id="nome" value="#{clienteBean.entidade.nome}" />
                 
                 <!-- Campos específicos de cliente, como Limite de Crédito -->
                 <p:outputLabel value="Limite" for="limite" />
                 <p:inputNumber id="limite" value="#{clienteBean.entidade.dadosCliente.limiteCredito}" />
             </p:panelGrid>
             
             <p:commandButton value="Salvar" action="#{clienteBean.salvar}" ... />
        </h:form>
    </ui:define>
</ui:composition>
