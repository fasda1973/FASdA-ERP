<ui:composition template="/WEB-INF/template/templateCRUD.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <ui:param name="managedBean" value="#{clienteBean}" />
    
    <ui:define name="tituloHead">Clientes</ui:define>

    <ui:define name="titulo">
    	<i class="fa-solid fa-handshake"></i>
    	<span>Clientes</span>
    </ui:define>
    
    <ui:define name="pesquisa">
        <p:inputText id="termoPesquisa" placeholder="Pesquisar pessoa..." 
                     size="30" value="#{pessoaBean.termoPesquisa}" />
    </ui:define>

    <ui:define name="colunas">      
	    <p:column headerText="Nome">
	        <h:outputText value="#{item.nome}" />
	    </p:column>
	    
	    <p:column headerText="CPF" width="150">
	        <h:outputText value="#{item.cpf}" />
	    </p:column> 
	    
	    <p:column headerText="Limite de Crédito" width="150">
	    	<h:outputText value="#{item.dadosCliente.limiteCredito}" />
	    </p:column>     
    </ui:define>

    <ui:define name="campos_formulario">       	    
	    <p:panelGrid columns="2" id="gridCampos" layout="grid">
	        <p:outputLabel value="Nome" for="nome" />
	        <p:inputText id="nome" value="#{clienteBean.entidade.nome}" />
	        
	        <p:outputLabel value="CPF" for="cpf" />
	        <p:inputMask id="cpf" value="#{clienteBean.entidade.cpf}" 
	                     mask="999.999.999-99" required="true" />
	        
	        <p:outputLabel value="Limite" for="limite" />
	        <p:inputNumber id="limite" value="#{clienteBean.entidade.dadosCliente.limiteCredito}" />
	    </p:panelGrid>      
    </ui:define>
</ui:composition>
