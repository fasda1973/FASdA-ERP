<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <div class="meu-sidebar">
        <h:form id="menu-form">
           
            <div class="perfil-resumo">
                <h4>Bem-vindo!</h4>
            </div>
			
            <p:menu toggleable="true" styleClass="menu-customizado">
                <p:submenu label="Cadastros">
                	<p:menuitem value="Pessoas" icon="fa fa-fw fa-person" outcome="/Pessoas" />
                	<p:menuitem value="Clientes" icon="fa fa-fw fa-handshake" outcome="/Clientes"
                				rendered="#{loginBean.admin or configuracaoBean.comumPodeVerClientes}" />               	
                	<p:menuitem value="Funcionarios" icon="fa fa-fw fa-users-gear" outcome="/Funcionarios" 
                				rendered="#{loginBean.admin or configuracaoBean.comumPodeVerFuncionarios}" />
                    <p:menuitem value="Fornecedores" icon="fa fa-fw fa-building" outcome="/Fornecedores"
                    			rendered="#{loginBean.admin or configuracaoBean.comumPodeVerFornecedores}" />
                    <p:menuitem value="Usuários" icon="fa fa-fw fa-users" outcome="/Usuarios" />
                    
                </p:submenu>

                <p:submenu label="Auxiliar">
                    <p:menuitem value="Configurações" icon="fa fa-fw fa-cog" outcome="/Configuracoes" />
                </p:submenu>
                
                <p:submenu label="Sistema">
                    <p:menuitem value="Sair" icon="fa fa-fw fa-sign-out" action="#{loginBean.logout}" />
                </p:submenu>
            </p:menu>
        </h:form>
    </div>
</ui:composition>
