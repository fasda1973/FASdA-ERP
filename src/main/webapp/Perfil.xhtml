<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template/Layout.xhtml">
                
    <ui:define name="title">Meu Perfil</ui:define>

    <ui:define name="conteudo">
        <h:form id="frm-perfil">
            <p:growl id="msg" showDetail="true" life="4000" />
			<div class="ui-g">
				<div class="ui-g-12 ui-md-8 ui-lg-6" style="margin: 0 auto; float: none;">
		            <p:panel header="Informações do Meu Perfil" styleClass="card">
			    		<p:tabView style="margin-top: 20px;">
				        	<p:tab title="Criar login" rendered="#{perfilBean.usuario.login == null}">
				        		<p:panelGrid columns="1" layout="grid" styleClass="ui-panelgrid-blank form-group">
				        				        			
					        		<h:panelGroup styleClass="md-inputfield">
					                    <p:inputText value="#{perfilBean.usuario.nome}" required="true" requiredMessage="O nome é obrigatório." style="width: auto;" />
					                    <label>Nome Completo</label>
				                	</h:panelGroup>
				                
				                	<h:panelGroup styleClass="md-inputfield">
					                    <p:inputText value="#{perfilBean.usuario.login}" style="width: auto;" />
					                    <label>Username / Login</label>
					                </h:panelGroup>
					                
					                <h:panelGroup styleClass="md-inputfield">
					                    <p:password value="#{perfilBean.novaSenha}" style="width: auto;" feedback="true" 
					                                promptLabel="Digite a nova senha" weakLabel="Fraca" goodLabel="Boa" strongLabel="Excelente"/>
					                    <label>Senha</label>
					                </h:panelGroup>
					
					                <h:panelGroup styleClass="md-inputfield">
					                    <p:password value="#{perfilBean.confirmaNovaSenha}" style="width: auto;" feedback="false"/>
					                    <label>Confirme a Senha</label>
					                </h:panelGroup>				                
				                </p:panelGrid>
				        	</p:tab>
				        
				            <p:tab title="Geral" rendered="#{perfilBean.usuario.login != null}">
					            <p:panelGrid columns="1" layout="grid" styleClass="ui-panelgrid-blank form-group">			            			                
					                <h:panelGroup styleClass="md-inputfield">
					                    <p:inputText value="#{perfilBean.usuario.login}" disabled="true" style="width: auto;" />
					                    <label>Username / Login</label>
					                </h:panelGroup>
					
					                <h:panelGroup styleClass="md-inputfield">
					                    <p:inputText value="#{perfilBean.usuario.perfil.descricao}" disabled="true" style="width: auto;" />
					                    <label>Nível de Acesso</label>
					                </h:panelGroup>
					
					                <h:panelGroup styleClass="md-inputfield">
					                    <p:inputText value="#{perfilBean.usuario.nome}" required="true" requiredMessage="O nome é obrigatório." style="width: auto;" />
					                    <label>Nome Completo</label>
					                </h:panelGroup>				                	                
					            </p:panelGrid>
				            </p:tab>
				
							<p:tab title="Alterar senha" rendered="#{perfilBean.usuario.login != null}">			
					            <p:panelGrid columns="1" layout="grid" styleClass="ui-panelgrid-blank form-group">		                
					                <h:panelGroup styleClass="md-inputfield">
					                    <p:password value="#{perfilBean.senhaAtual}" style="width: auto;" feedback="false"/>
					                    <label>Senha Atual</label>
					                </h:panelGroup>
					
					                <h:panelGroup styleClass="md-inputfield">
					                    <p:password value="#{perfilBean.novaSenha}" style="width: auto;" feedback="true" 
					                                promptLabel="Digite a nova senha" weakLabel="Fraca" goodLabel="Boa" strongLabel="Excelente"/>
					                    <label>Nova Senha</label>
					                </h:panelGroup>
					
					                <h:panelGroup styleClass="md-inputfield">
					                    <p:password value="#{perfilBean.confirmaNovaSenha}" style="width: auto;" feedback="false"/>
					                    <label>Confirme a Nova Senha</label>
					                </h:panelGroup>			
					            </p:panelGrid>
							</p:tab>
				            <br/>
				                               
		            	</p:tabView>
		            	
		            	<p:commandButton value="Salvar Alterações" 
				                             action="#{perfilBean.salvarPerfil}" 
				                             update="frm-perfil" 
				                             icon="fa fa-save" 
				                             styleClass="blue-btn" 
				                             style="width: auto;" />
				                             
					</p:panel>
				</div>
			</div>  
        </h:form>
    </ui:define>

</ui:composition>
