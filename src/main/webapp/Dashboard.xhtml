<ui:composition template="/WEB-INF/template/Layout.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <ui:define name="tituloHead">Dashboard</ui:define>

    <ui:define name="conteudo">
        <f:metadata>
            <f:viewAction action="#{dashboardBean.inicializar}" />
        </f:metadata>

        <div class="ui-g">
        	<div class="ui-g-12 ui-md-6 ui-lg-2">
	            <div class="card-dashboard card-dashboard:hover" style="background: #4242FF; color: white; padding: 20px; border-radius: 8px;">
	                <i class="fa-solid fa-handshake" style="font-size: 2em; float: right; opacity: 0.5;"></i>
	                <span >CLIENTES</span>
	                <h2 style="margin: 0;">#{dashboardBean.totalClientes}</h2>
	            </div>
	        </div>
        	
        	<div class="ui-g-12 ui-md-6 ui-lg-2">
	            <div class="card-dashboard card-dashboard:hover" style="background: #FF2F2F; color: white; padding: 20px; border-radius: 8px;">
	                <i class="fa-solid fa-users-gear" style="font-size: 2em; float: right; opacity: 0.5;"></i>
	                <span>FUNCIONARIOS</span>
	                <h2 style="margin: 0;">#{dashboardBean.totalFuncionarios}</h2>
	            </div>
	        </div>
        		
	        <div class="ui-g-12 ui-md-6 ui-lg-2">
	            <div class="card-dashboard card-dashboard:hover" style="background: #4CAF50; color: white; padding: 20px; border-radius: 8px;">
	                <i class="fa fa-building" style="font-size: 2em; float: right; opacity: 0.5;"></i>
	                <span>FORNECEDORES</span>
	                <h2 style="margin: 0;">#{dashboardBean.totalFornecedores}</h2>
	            </div>
	        </div>
		    
		    <div class="ui-g-12 ui-md-6 ui-lg-2">
		        <div class="card-dashboard card-dashboard:hover" style="background: #FF9800; color: white; padding: 20px; border-radius: 8px;">
		            <i class="fa-solid fa-person" style="font-size: 2em; float: right; opacity: 0.5;"></i>
		            <span>PESSOAS</span>
		            <h2 style="margin: 0;">#{dashboardBean.totalPessoas}</h2>
		        </div>
		    </div>
		    
		    <div class="ui-g-12 ui-md-6 ui-lg-2">
	            <div class="card-dashboard card-dashboard:hover" style="background: #2196F3; color: white; padding: 20px; border-radius: 8px;">
			        <i class="fa fa-users" style="font-size: 2em; float: right; opacity: 0.5;"></i>
			        <span>USUÁRIOS</span>
			        <h2 style="margin: 0;">#{dashboardBean.totalUsuarios}</h2>
		    	</div>
	        </div>
		    
		    <!-- Barras do Gráfico -->
	        <div class="ui-g-12">
	            <p:panel header="Estatísticas Cadastros de Pessoas" style="margin-top: 20px;">
	                <p:chart type="bar" model="#{dashboardBean.barModel}" style="height:350px;" responsive="true"/>
	            </p:panel>
	        </div>
		</div>
    </ui:define>
</ui:composition>
